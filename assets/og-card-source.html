<!doctype html>
<!--
  Source for assets/og-card.png (1200x630 Open Graph / Twitter share card).
  Regenerate: open in a browser at exactly 1200x630 (or headless Chromium,
  deviceScaleFactor 2, downsample to 1200x630) and screenshot the body.
  Design language matches the site: theater-noir curtains, valance, marquee.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@600;700&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(62% 58% at 50% 26%, rgba(243,231,191,.13), transparent 70%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='7' height='7'><circle cx='1' cy='1' r='.7' fill='%23F3E7BF' opacity='.05'/></svg>"),
      #161616;
    font-family: 'Montserrat', sans-serif;
  }
  /* Edge vignette */
  body:after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    box-shadow: inset 0 0 160px 40px rgba(0,0,0,.7);
  }

  /* Velvet */
  .velvet {
    background:
      linear-gradient(180deg, rgba(0,0,0,.45), rgba(0,0,0,0) 24%, rgba(0,0,0,.05) 70%, rgba(0,0,0,.5)),
      repeating-linear-gradient(90deg, #58100a 0 12px, #8c2213 12px 30px, #a82c18 30px 42px, #75180d 42px 58px);
  }
  /* Curtain legs */
  .leg { position: absolute; top: 0; bottom: 0; width: 86px; z-index: 3; }
  .leg.left  { left: 0;  box-shadow: 26px 0 42px rgba(0,0,0,.62); }
  .leg.right { right: 0; box-shadow: -26px 0 42px rgba(0,0,0,.62); }
  /* Scalloped valance */
  .valance {
    position: absolute; top: 0; left: 0; right: 0; height: 74px; z-index: 4;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,.5));
    -webkit-mask-image: linear-gradient(#000 0 44px, transparent 44px), radial-gradient(circle at 28px 44px, #000 26px, transparent 27px);
    -webkit-mask-size: 100% 100%, 56px 74px;
    -webkit-mask-repeat: no-repeat, repeat-x;
    mask-image: linear-gradient(#000 0 44px, transparent 44px), radial-gradient(circle at 28px 44px, #000 26px, transparent 27px);
    mask-size: 100% 100%, 56px 74px;
    mask-repeat: no-repeat, repeat-x;
  }

  /* Content */
  .stage {
    position: absolute; inset: 74px 86px 64px; z-index: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 18px; padding-bottom: 6px;
  }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand img { width: 52px; height: 52px; object-fit: contain; }
  .brand span {
    font-family: 'Anton', sans-serif; font-size: 32px; letter-spacing: .24em;
    color: #FCF9EF; padding-left: .24em; /* balance tracking */
  }
  .kicker {
    display: inline-flex; align-items: center; gap: 14px;
    font-size: 15px; font-weight: 700; letter-spacing: .34em; text-transform: uppercase;
    color: #F3E7BF; opacity: .92; margin-top: 6px;
  }
  .kicker:before, .kicker:after { content: ""; width: 8px; height: 8px; border-radius: 50%; background: #E3452D; }
  h1 {
    font-family: 'Anton', sans-serif; font-weight: 400; text-transform: uppercase;
    font-size: 80px; line-height: 1.07; letter-spacing: .015em; color: #FCF9EF;
    text-shadow: 0 6px 30px rgba(0,0,0,.55);
  }
  h1 .cherry { color: #E3452D; }
  .sub {
    font-size: 24px; font-weight: 600; line-height: 1.45; color: rgba(252,249,239,.82);
    max-width: 760px; margin-top: 2px;
  }

  /* Film strip footer */
  .strip {
    position: absolute; left: 0; right: 0; bottom: 0; height: 64px; z-index: 5;
    background: #101010; border-top: 1px solid rgba(252,249,239,.14);
    display: flex; align-items: center; justify-content: center;
  }
  .strip:before, .strip:after {
    content: ""; position: absolute; left: 0; right: 0; height: 10px;
    background: repeating-linear-gradient(90deg, transparent 0 24px, rgba(252,249,239,.85) 24px 38px, transparent 38px 62px);
  }
  .strip:before { top: 8px; }
  .strip:after { bottom: 8px; }
  .strip .chip {
    position: relative; z-index: 1; background: #E3452D; color: #FCF9EF;
    font-family: 'Anton', sans-serif; font-size: 22px; letter-spacing: .22em;
    padding: 8px 26px 7px calc(26px + .22em); border-radius: 4px;
    box-shadow: 0 6px 18px rgba(0,0,0,.5);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="brand">
      <img src="Tongue-RGB-White-SM.png" alt="">
      <span>AFTERTASTE</span>
    </div>
    <div class="kicker">Now Showing</div>
    <h1>Track. Trade takes.<br><span class="cherry">Trust your tastebuds.</span></h1>
    <p class="sub">The social hub for movie &amp; TV fans who trust people over algorithms.</p>
  </div>
  <div class="valance velvet"></div>
  <div class="leg left velvet"></div>
  <div class="leg right velvet"></div>
  <div class="strip"><span class="chip">AFTERTASTE.COM</span></div>
</body>
</html>
